<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>sakilingo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 40px;
    }

    input {
      width: 600px;
      padding: 10px;
      font-size: 16px;
    }

    button {
      padding: 10px;
      font-size: 16px;
      margin-left: 10px;
    }

    table {
      border-collapse: collapse;
      margin-top: 20px;
    }

    th,
    td {
      border: 1px solid #333;
      padding: 8px 12px;
    }

    th {
      background-color: #f0f0f0;
    }
  </style>

  <script type="module" src="script.js"></script>
</head>

<body>

  <input id="textInput" type="text" placeholder="Click mic and speak..." />
  <button id="micBtn">🎤</button>
  <button id="confirmBtn">Check</button>
  <button id="nextBtn">Next</button>
  <label id="countLabel">Counter: 0</label>
  <label id="nextSentenceLabel"></label>

  <h2>TSV Data</h2>
  <table id="tsvTable"></table>

</body>

</html>
