<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TSV Table</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 40px; }
    input { width: 600px; padding: 10px; font-size: 16px; }
    button { padding: 10px; font-size: 16px; margin-left: 10px; }

    table {
      border-collapse: collapse;
      margin-top: 20px;
    }
    th, td {
      border: 1px solid #333;
      padding: 8px 12px;
    }
    th {
      background-color: #f0f0f0;
    }
  </style>
</head>
<body>

  <input id="textInput" type="text" placeholder="Click mic and speak..." />
  <button id="micBtn">🎤</button>
  <button id="confirmBtn">Check</button>
  <button id="nextBtn">Next</button>
  <label id="countLabel">Counter: 0</label>
  <label id="nextSentenceLabel"></label>

<h2>TSV Data</h2>
<table id="tsvTable"></table>

<script>
  var counter = 0;
    const input = document.getElementById("textInput");
    const micBtn = document.getElementById("micBtn");
    const confirmBtn = document.getElementById("confirmBtn");
    const nextBtn = document.getElementById("nextBtn");
    const countLabel = document.getElementById("countLabel");
    const nextSentenceLabel = document.getElementById("nextSentenceLabel");

    // Check browser support
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (!SpeechRecognition) {
      alert("Speech Recognition not supported in this browser.");
    } else {
      const recognition = new SpeechRecognition();
      recognition.lang = "en-US";
      recognition.continuous = false;
      recognition.interimResults = false;

      micBtn.addEventListener("click", () => {
        recognition.start();
      });

      recognition.onresult = (event) => {
        const transcript = event.results[0][0].transcript;
        input.value = transcript;
      };

      recognition.onerror = (event) => {
        console.error("Speech recognition error:", event.error);
      };


      confirmBtn.addEventListener("click", () => {
        const userInput = input.value.trim();
        if (userInput) {
          alert(`You entered: ${userInput}`);
        } else {
          alert("Please enter some text first.");
        }
      });

      nextBtn.addEventListener("click", () => {
        counter++;
        countLabel.textContent = `Counter: ${counter}`;
        nextSentenceLabel.textContent = `Next sentence: ${sentences[counter] ?? ""}`; 
      });
    }

    var sentences = [];
  fetch('sentences.tsv')
    .then(res => {
      if (!res.ok) throw new Error('Failed to load TSV');
      return res.text();
    })
    .then(text => {
      const lines = text.trim().split('\n');

      // Extract headers
      const headers = lines[0].split('\t');

      // Map rows to objects
      const data = lines.slice(1).map(line => {
        const values = line.split('\t');
        const obj = {};

        headers.forEach((header, i) => {
          obj[header] = values[i] ?? "";
        });

        return obj;
      });

      // Result
      console.log(data);

      // Optional: attach to window for inspection
      window.sentences = data;
    })
    .catch(err => {
      console.error(err);
    });

  fetch('sentences.tsv')
    .then(response => {
      if (!response.ok) {
        throw new Error('Failed to load TSV file');
      }
      return response.text();
    })
    .then(text => {
      const rows = text.trim().split('\n').map(row => row.split('\t'));
      const table = document.getElementById('tsvTable');

      rows.forEach((row, rowIndex) => {
        const tr = document.createElement('tr');

        row.forEach(cell => {
          const cellElement = document.createElement(rowIndex === 0 ? 'th' : 'td');
          cellElement.textContent = cell;
          tr.appendChild(cellElement);
        });

        table.appendChild(tr);
      });
    })
    .catch(error => {
      console.error(error);
      document.body.insertAdjacentHTML('beforeend', '<p>Error loading data.</p>');
    });
</script>

</body>
</html>
