<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TSV Table</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 40px; }
    input { width: 600px; padding: 10px; font-size: 16px; }
    button { padding: 10px; font-size: 16px; margin-left: 10px; }

    table {
      border-collapse: collapse;
      margin-top: 20px;
    }
    th, td {
      border: 1px solid #333;
      padding: 8px 12px;
    }
    th {
      background-color: #f0f0f0;
    }
  </style>
</head>
<body>

    <input id="textInput" type="text" placeholder="Click mic and speak..." />
  <button id="micBtn">🎤</button>
  <button id="confirmBtn">🎤</button>

<h2>TSV Data</h2>
<table id="tsvTable"></table>

<script>

    const input = document.getElementById("textInput");
    const micBtn = document.getElementById("micBtn");
    const confirmBtn = document.getElementById("confirmBtn");

    // Check browser support
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (!SpeechRecognition) {
      alert("Speech Recognition not supported in this browser.");
    } else {
      const recognition = new SpeechRecognition();
      recognition.lang = "en-US";
      recognition.continuous = false;
      recognition.interimResults = false;

      micBtn.addEventListener("click", () => {
        recognition.start();
      });

      recognition.onresult = (event) => {
        const transcript = event.results[0][0].transcript;
        input.value = transcript;
      };

      recognition.onerror = (event) => {
        console.error("Speech recognition error:", event.error);
      };


      confirmBtn.addEventListener("click", () => {
        const userInput = input.value.trim();
        if (userInput) {
          alert(`You entered: ${userInput}`);
        } else {
          alert("Please enter some text first.");
        }
      });
    }

  fetch('sentences.tsv')
    .then(response => {
      if (!response.ok) {
        throw new Error('Failed to load TSV file');
      }
      return response.text();
    })
    .then(text => {
      const rows = text.trim().split('\n').map(row => row.split('\t'));
      const table = document.getElementById('tsvTable');

      rows.forEach((row, rowIndex) => {
        const tr = document.createElement('tr');

        row.forEach(cell => {
          const cellElement = document.createElement(rowIndex === 0 ? 'th' : 'td');
          cellElement.textContent = cell;
          tr.appendChild(cellElement);
        });

        table.appendChild(tr);
      });
    })
    .catch(error => {
      console.error(error);
      document.body.insertAdjacentHTML('beforeend', '<p>Error loading data.</p>');
    });
</script>

</body>
</html>
