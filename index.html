<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>sakilingo</title>
  <style>
    body {
      padding: 10px;
    }

    button {
      padding: 3px;
      margin-left: 10px;
    }
  </style>

  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
  <script type="module" src="script.js"></script>
</head>

<body>

  <div>
    <input id="textInput" type="text" style="width: 600px;" placeholder="Click mic and speak..." />
    <button id="micBtn">🎤</button>
    <button id="prevBtn">Prev</button>
    <button id="nextBtn">Next</button>
    <label id="countLabel">Counter: 0</label>
  </div>
  <div>
    Next sentence: <label id="nextSentenceLabel"></label> (<label id="japaneseLabel"></label>)
  </div>
  <form id="readOutForm">
    <label><input type="radio" name="accent" value="US" checked> American</label>
    <label><input type="radio" name="accent" value="GB"> British</label>
    <label><input type="radio" name="accent" value="AU"> Aussie</label>
    <button type="submit">Read</button>
  </form>

  <a href="" target="sakilingoGoogleTTS" rel="noopener noreferrer" id="readOutByGoogle">Read by Google with American
    accent</a>

  <h2>TSV Data</h2>
  <table id="tsvTable"></table>

</body>

</html>
